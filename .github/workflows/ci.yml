name: Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-pipeline:
    name: Run Nextflow Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: "latest"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: sc-pipeline
          environment-file: environment.yml
          use-mamba: true  # <--- THIS IS THE FIX
          channels: conda-forge,bioconda

      - name: Test Scanpy Backend
        shell: bash -el {0}
        run: nextflow run main.nf -profile conda --backend scanpy

      - name: Test Seurat Backend
        shell: bash -el {0}
        run: nextflow run main.nf -profile conda --backend seurat
